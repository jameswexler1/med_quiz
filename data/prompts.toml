#  MedQuiz — AI Prompts
#  Edit freely between triple quotes.
#  After editing: push to Netlify or run `hugo --minify`
# ═══════════════════════════════════════════════════════

[br_json]
label  = "🇧🇷 Residência Médica — JSON"
format = "JSON"
prompt = """Você é um especialista em provas de residência médica brasileira (USP, UNIFESP, ENARE, SUS-SP, AMRIGS etc.).
Gere um array JSON EXATAMENTE no formato solicitado abaixo, sempre em bloco de código copiável, sem qualquer texto antes ou depois.

TEMA(S): [cole aqui]
NÍVEL DE DETALHAMENTO: [básico/intermediário/alto/extremamente detalhado]
NÚMERO DE QUESTÕES: [cole aqui]
FONTE PRINCIPAL PARA EMBASAMENTO: [ANEXO(S) / INTERNET / ANEXO(S) + INTERNET]
REFERÊNCIAS PRIORITÁRIAS: [cole aqui]

Regras obrigatórias:
- Gere EXATAMENTE o número solicitado de questões.
- O output deve ser SOMENTE um array JSON válido, dentro de bloco de código.
- Cada questão deve ser um objeto com EXATAMENTE estas chaves: "title", "choices", "correctIndex", "explanation".
- "title": caso clínico detalhado, longo, complexo, em estilo prova de residência.
- "choices": array de EXATAMENTE 4 alternativas, neste formato:
  ["A) ...", "B) ...", "C) ...", "D) ..."]
- "correctIndex": inteiro de 0 a 3.
- "explanation": explicação longa, técnica, completa, com raciocínio clínico, justificando a correta e refutando as incorretas. IMPORTANTE: não mencione a letra da alternativa correta na explicação (ex: não escreva "A alternativa B está correta" ou "A opção C é a correta"). Explique o raciocínio clínico diretamente, sem referenciar letras.
- As alternativas devem ser plausíveis e com distratores fortes.
- Não escreva introdução, conclusão ou comentários fora do JSON.

Formato exato:
[
  {
    "title": "...",
    "choices": ["A) ...", "B) ...", "C) ...", "D) ..."],
    "correctIndex": 0,
    "explanation": "..."
  }
]

Agora gere as questões."""

[br_text]
label  = "🇧🇷 Residência Médica — Texto"
format = "Texto"
prompt = """Você é um especialista em provas de residência médica brasileira (USP, UNIFESP, ENARE, SUS-SP, AMRIGS etc.).
Gere questões em formato de texto simples, exatamente como mostrado abaixo, sem qualquer texto antes ou depois.

TEMA(S): [cole aqui]
NÍVEL DE DETALHAMENTO: [básico/intermediário/alto/extremamente detalhado]
NÚMERO DE QUESTÕES: [cole aqui]
FONTE PRINCIPAL PARA EMBASAMENTO: [ANEXO(S) / INTERNET / ANEXO(S) + INTERNET]
REFERÊNCIAS PRIORITÁRIAS: [cole aqui]

Regras obrigatórias:
- Gere EXATAMENTE o número solicitado de questões.
- "title": caso clínico detalhado, longo, complexo, em estilo prova de residência.
- EXATAMENTE 4 alternativas por questão (A, B, C, D).
- As alternativas devem ser plausíveis e com distratores fortes.
- A linha "Correta:" deve conter APENAS a letra da resposta correta (ex: Correta: C).
- A linha "Explicação:" deve conter explicação longa, técnica e completa. IMPORTANTE: não mencione a letra da alternativa correta na explicação (ex: não escreva "A alternativa B está correta" ou "A opção C é a correta"). Explique o raciocínio clínico diretamente, sem referenciar letras.
- Separe cada questão com uma linha em branco.
- Não escreva introdução, conclusão ou comentários.

Formato exato:
1. Enunciado completo da questão aqui?
A. Primeira alternativa
B. Segunda alternativa
C. Terceira alternativa
D. Quarta alternativa
Correta: B
Explicação: Explicação detalhada aqui, justificando a correta e refutando as incorretas.

Agora gere as questões."""

[usmle_json]
label  = "🇺🇸 USMLE Step 1/2 — JSON"
format = "JSON"
prompt = """You are an expert in USMLE Step 1 and Step 2 CK question writing, with deep knowledge of NBME style, First Aid, Pathoma, Sketchy, and UpToDate.
Generate a JSON array EXACTLY in the format specified below, always in a copyable code block, with no text before or after.

TOPIC(S): [paste here]
DETAIL LEVEL: [basic/intermediate/high/extremely detailed]
TARGET EXAM: [Step 1 / Step 2 CK / both]
NUMBER OF QUESTIONS: [paste here]
PRIMARY SOURCE: [ATTACHMENT(S) / INTERNET / ATTACHMENT(S) + INTERNET]
PRIORITY REFERENCES: [paste here]

Mandatory rules:
- Generate EXACTLY the requested number of questions.
- Output ONLY a valid JSON array, inside a code block.
- Each question must be an object with EXACTLY these keys: "title", "choices", "correctIndex", "explanation".
- "title": detailed USMLE-style clinical vignette with age, sex, complaint, HPI, vitals, PE, labs/imaging. End with a clear stem question.
- "choices": array of EXACTLY 4 answer choices:
  ["A) ...", "B) ...", "C) ...", "D) ..."]
- "correctIndex": integer from 0 to 3.
- "explanation": long, technical explanation — justify correct answer and explicitly refute each wrong answer. Reference pathophysiology and current guidelines. IMPORTANT: do not mention the letter of the correct answer in the explanation (e.g. do not write "Option B is correct" or "Answer C is the best choice"). Explain the clinical reasoning directly without referencing letters.
- Distractors must reflect common USMLE traps.
- Do not write any introduction, conclusion, or comments outside the JSON.

Exact format:
[
  {
    "title": "...",
    "choices": ["A) ...", "B) ...", "C) ...", "D) ..."],
    "correctIndex": 0,
    "explanation": "..."
  }
]

Now generate the questions."""

[usmle_text]
label  = "🇺🇸 USMLE Step 1/2 — Texto"
format = "Texto"
prompt = """You are an expert in USMLE Step 1 and Step 2 CK question writing, with deep knowledge of NBME style, First Aid, Pathoma, Sketchy, and UpToDate.
Generate questions in simple text format exactly as shown below, with no text before or after.

TOPIC(S): [paste here]
DETAIL LEVEL: [basic/intermediate/high/extremely detailed]
TARGET EXAM: [Step 1 / Step 2 CK / both]
NUMBER OF QUESTIONS: [paste here]
PRIMARY SOURCE: [ATTACHMENT(S) / INTERNET / ATTACHMENT(S) + INTERNET]
PRIORITY REFERENCES: [paste here]

Mandatory rules:
- Generate EXACTLY the requested number of questions.
- Each question must be a detailed USMLE-style clinical vignette.
- EXACTLY 4 answer choices per question (A, B, C, D).
- Distractors must reflect common USMLE traps.
- The "Correct:" line must contain ONLY the letter (e.g. Correct: C).
- The "Explanation:" line must be long, technical, and complete. IMPORTANT: do not mention the letter of the correct answer in the explanation (e.g. do not write "Option B is correct" or "Answer C is the best choice"). Explain the clinical reasoning directly without referencing letters.
- Separate questions with a blank line.
- Do not write any introduction, conclusion, or comments.

Exact format:
1. Full clinical vignette question here?
A. First option
B. Second option
C. Third option
D. Fourth option
Correct: B
Explanation: Detailed explanation here, justifying correct and refuting wrong answers.

Now generate the questions."""
